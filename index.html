<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chzzk Viewer Dock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-container">
        <div id="stats-container">
            <div class="stat-item" id="concurrent-viewers-item">
                <span class="label">동시 시청자</span>
                <span class="value" id="concurrent-viewers">0</span>
            </div>
            <div class="stat-item" id="peak-viewers-item">
                <span class="label">최고 시청자</span>
                <span class="value" id="peak-viewers">0</span>
            </div>
            <div class="stat-item" id="average-viewers-item">
                <span class="label">평균 시청자</span>
                <span class="value" id="average-viewers">0</span>
            </div>
            <div class="stat-item" id="followers-item">
                <span class="label">팔로워</span>
                <span class="value" id="followers">0</span>
            </div>
        </div>

        <div id="settings-container">
            <div id="settings-toggle-button">설정 열기</div>
            <div id="settings-panel">
                 <div class="setting-item">
                    <label for="channel-id-input">방송 주소</label>
                    <input type="text" id="channel-id-input" placeholder="전체 주소 또는 ID 붙여넣기">
                    <button id="save-channel-id">저장</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
