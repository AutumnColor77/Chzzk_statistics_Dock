<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheese Stick Dock</title>
    <link rel="icon" type="image/png" href="icon_green.png">
    <link rel="apple-touch-icon" href="icon_green.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-glow"></div>
    <div id="main-container">

        <div id="auth-section" class="glass-panel">
            <div class="auth-header">
                <img class="auth-icon" src="icon_green.png" width="48" height="48" alt="Cheese Stick Dock">
                <h2>Cheese Stick Dock</h2>
            </div>
            <p class="auth-desc">방송 정보와 귀중한 통계를 보려면<br />치지직 계정 연동과 승인이 필요합니다.</p>
            <button id="chzzk-login-btn" class="chzzk-btn chzzk-btn-glow">치지직 계정 연동하기</button>
            <p class="auth-notice">개인정보와 인증 토큰은 별도로 저장되지 않아 안전합니다.<br />최적의 성능을 위해 설정 데이터만 일시적으로 캐싱됩니다.</p>
        </div>

        <div id="dashboard-section" style="display: none; flex-direction: column; gap: 16px;">
            <div class="dashboard-header">
                <div class="header-title">
                    <img class="header-logo" src="icon_green.png" width="34" height="34" alt="">
                    <span id="header-channel-name">Cheese Stick Dock</span>
                </div>
            </div>

            <div id="settings-panel" class="glass-panel">
                <div class="setting-item">
                    <label for="live-title-input">방송 제목</label>
                    <input type="text" id="live-title-input" class="modern-input" placeholder="방송 제목을 입력하세요">
                </div>
                <div class="setting-item" style="display: none;">
                    <label for="live-category-type">카테고리 종류</label>
                    <div class="select-wrapper">
                        <select id="live-category-type" class="modern-input">
                            <option value="GAME">게임 (GAME)</option>
                            <option value="SPORTS">스포츠 (SPORTS)</option>
                            <option value="ETC">기타 (ETC)</option>
                        </select>
                    </div>
                </div>
                <div class="setting-item" style="position: relative;">
                    <label for="category-search-input">카테고리 검색</label>
                    <input type="text" id="category-search-input" class="modern-input"
                        placeholder="검색어 입력 후 대기 (예: 원신)">
                    <div id="category-search-results" class="autocomplete-dropdown" style="display: none;"></div>
                    <input type="hidden" id="live-category-id" value="">

                    <div id="selected-category-display" class="selected-badge" style="display: none;">
                        <span class="badge-dot"></span><span id="selected-category-name"></span>
                    </div>
                </div>
                <div class="setting-item">
                    <label for="live-tags-input">태그 (쉼표로 구분)</label>
                    <input type="text" id="live-tags-input" class="modern-input" placeholder="예: 소통, 종합게임, 신작">
                </div>

                <div class="action-buttons">
                    <button id="save-live-settings" class="chzzk-btn">설정 업데이트</button>
                </div>
                <p id="settings-status-msg"></p>
            </div>

            <div id="stats-container">
                <div class="stat-item" id="concurrent-viewers-item">
                    <span class="label">동시 시청자</span>
                    <span class="value" id="concurrent-viewers">0</span>
                </div>
                <div class="stat-item" id="peak-viewers-item">
                    <span class="label">최고 시청자</span>
                    <span class="value" id="peak-viewers">0</span>
                </div>
                <div class="stat-item" id="average-viewers-item">
                    <span class="label">평균 시청자</span>
                    <span class="value" id="average-viewers">0</span>
                </div>
                <div class="stat-item" id="followers-item">
                    <span class="label">팔로워</span>
                    <span class="value" id="followers">0</span>
                </div>
            </div>

            <button id="refresh-stats-btn" class="refresh-btn" title="통계 새로고침">
                <svg class="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                <span>통계 새로고침</span>
            </button>

            <button id="chzzk-logout-btn" class="secondary-btn">연동 해제 및 로그아웃</button>
        </div>

    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
